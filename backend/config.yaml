server:
  host: "0.0.0.0"
  port: 3000
  env: "development" # Options: development, production
  cors_origins:
    - "http://localhost:5173"

database:
  host: "localhost"
  port: 5432
  name: "skysync"
  user: "postgres"
  password: "${DB_PASSWORD}" # Use environment variable for sensitive data
  max_connections: 10
  ssl_mode: "disable" # Options: disable, require, verify-ca, verify-full

auth:
    jwt_secret: "${JWT_SECRET}" # Use environment variable for sensitive data
    acceess_token_ttl: 15 # Access token time-to-live in minutes
    refresh_token_ttl: 43200 # Refresh token time-to-live in minutes (30 days)
    bcrypt_cost: 12 # Cost factor for bcrypt hashing
    max_failed_login_attempts: 5 # Max failed login attempts before lockout
    lockout_duration: 15 # Lockout duration in minutes after max failed attempts

email:
  provider: "smtp" # Options: smtp, sendgrid, mailgun
  smtp_host: "smtp.google.com"
  smtp_port: 587
  smtp_user: "${SMTP_USER}" # Use environment variable for sensitive data
  smtp_password: "${SMTP_PASSWORD}" # Use environment variable for sensitive data
  from_address: "bartoszkasyna@gmail.com"

storage:
  max_file_size_bytes: 1073741824 # 1 GB
  deafult_quota_bytes: 10737418240 # 10 GB
  trash_retention_days: 30
  trash_purge_interval_hours: 24

logging:
  level: "info" # Options: debug, info, warn, error
  fomrat : "json" # Options: json, text
  log_to_file: true

frontend:
  url: "http://localhost:5173"
