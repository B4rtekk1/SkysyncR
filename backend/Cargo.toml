[package]
name = "SkysyncR"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.9"
dotenvy = "0.15.7"
tokio = { version = "1.52.3" , features = ["full"]}
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.150"
sqlx = { version = "0.9.0", features = ["runtime-tokio", "postgres", "uuid"]}
uuid = {version = "1.23.4", features = ["serde", "v4"]}
bcrypt = "0.19.2"
aes-gcm = "0.10.3"
rsa = "0.9.10"
rand = "0.8.6"
tower-http = {version = "0.7.0", features = ["cors"]}
chrono = { version = "0.4.45" , features = ["serde"]}