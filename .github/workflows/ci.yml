name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://admin:admin@localhost:5432/appdb
  JWT_SECRET: ci-jwt-secret-at-least-32-bytes-long

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --version 0.9.0 --no-default-features --features postgres --locked

      - name: Apply database schema
        run: cargo run --bin migrate

      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets

      - name: Verify SQLx query cache
        run: cargo sqlx prepare --check -- --all-targets

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - run: cargo audit

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
